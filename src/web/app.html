<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>简仓</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="app-body">
  <header class="app-header" id="app-header">
    <button class="header-menu" id="header-menu">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="header-back" id="header-back" hidden>
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1 class="header-title" id="header-title">简仓</h1>
    <div class="header-right" id="header-right"></div>
  </header>

  <main class="app-content" id="page"></main>

  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-user">
        <div class="drawer-avatar" id="drawer-avatar"></div>
        <div class="drawer-info">
          <div class="drawer-name" id="drawer-name"></div>
          <div class="drawer-tenant" id="drawer-tenant"></div>
        </div>
      </div>
    </div>
    <nav class="drawer-nav" id="drawer-nav"></nav>
  </aside>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
